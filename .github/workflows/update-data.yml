name: Actualizar datos de fondos

on:
  schedule:
    # 21:00 hora Chile ≈ 00:00 UTC (ajusta si cambia el horario de verano)
    - cron: "0 0 * * *"
  workflow_dispatch: {} # te deja correrlo a mano desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar script de actualización
        run: node scripts/update-data.mjs

      - name: Confirmar y subir cambios (si hay)
        run: |
          git config user.name "br-fundtracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/funds.json
          git diff --staged --quiet || git commit -m "Actualización diaria de datos de fondos"
          git push
